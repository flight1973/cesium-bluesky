<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueSky ATM Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }

    /*
     * Layout replicating the Qt MainWindow:
     *
     *  ┌──────────────────────────────┬───────────┐
     *  │                              │ Traffic   │
     *  │       Cesium Viewer          │ List      │
     *  │       (RadarWidget)          │ (databox) │
     *  │                              │           │
     *  ├──────────────────────────────┴───────────┤
     *  │ t: 00:00, Δt: 0.05, Speed: 1.0x, ...    │
     *  ├──────────────────────────────────────────┤
     *  │ Stack output (Stackwin)                  │
     *  ├──────────────────────────────────────────┤
     *  │ >> command input (Cmdline)               │
     *  └──────────────────────────────────────────┘
     */
    #app {
      display: grid;
      width: 100%; height: 100%;
      grid-template-rows: 1fr auto 180px;
      grid-template-columns: 1fr 260px;
      grid-template-areas:
        "viewer   sidebar"
        "infobar  infobar"
        "console  console";
    }
    /* Aircraft detail panel overlays the sidebar */
    aircraft-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 20;
    }
    aircraft-panel[hidden] { display: none; }
    fms-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 25;
    }
    fms-panel[hidden] { display: none; }
    areas-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 25;
    }
    areas-panel[hidden] { display: none; }

    /* Cesium viewer fills the main area */
    #cesium-container {
      grid-area: viewer;
      position: relative;
      overflow: hidden;
      min-height: 0;  /* prevent grid blowout */
    }
    #cesium-container .cesium-viewer,
    #cesium-container .cesium-widget,
    #cesium-container .cesium-widget canvas {
      width: 100% !important;
      height: 100% !important;
    }
    #cesium-container .cesium-viewer-bottom { display: none; }

    /* Toolbar overlays top-left of viewer */
    bluesky-toolbar {
      position: absolute;
      top: 8px; left: 8px;
      z-index: 10;
      border-radius: 4px;
    }

    /* Area tool overlays below toolbar */
    area-tool {
      position: absolute;
      top: 40px; left: 8px;
      z-index: 10;
    }

    /* Camera controls overlay bottom-left of viewer */
    camera-controls {
      position: absolute;
      bottom: 8px; left: 8px;
      z-index: 10;
    }

    /* Scale bar overlay bottom-right of viewer */
    scale-bar {
      position: absolute;
      bottom: 8px; right: 8px;
      z-index: 10;
    }

    /* Sidebar: traffic list */
    bluesky-traffic-list {
      grid-area: sidebar;
      border-left: 1px solid #333;
      overflow-y: auto;
      min-height: 0;
    }

    /* Info bar (siminfoLabel equivalent) */
    bluesky-statusbar { grid-area: infobar; }

    /* Console: output + input */
    bluesky-console { grid-area: console; }
  </style>
</head>
<body>
  <div id="app">
    <div id="cesium-container">
      <bluesky-toolbar></bluesky-toolbar>
      <area-tool hidden></area-tool>
      <camera-controls></camera-controls>
      <scale-bar></scale-bar>
    </div>
    <bluesky-traffic-list></bluesky-traffic-list>
    <aircraft-panel hidden></aircraft-panel>
    <fms-panel hidden></fms-panel>
    <areas-panel hidden></areas-panel>
    <bluesky-statusbar></bluesky-statusbar>
    <bluesky-console></bluesky-console>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
