<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueSky ATM Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }

    /*
     * Three-column layout:
     *
     *  ┌──────────┬─────────────────────┬───────────┐
     *  │ Layers   │                     │ Traffic   │
     *  │ (GIS     │   Cesium Viewer     │ List      │
     *  │  tree)   │                     │           │
     *  ├──────────┴─────────────────────┴───────────┤
     *  │ t: 00:00, Δt: 0.05, Speed: 1.0x, ...      │
     *  ├────────────────────────────────────────────┤
     *  │ Stack output + command input               │
     *  └────────────────────────────────────────────┘
     */
    #app {
      display: grid;
      width: 100%; height: 100%;
      grid-template-rows: 1fr auto 180px;
      grid-template-columns: 220px 1fr 260px;
      grid-template-areas:
        "layers  viewer   sidebar"
        "infobar infobar  infobar"
        "console console  console";
    }

    /* Layer panel — left column */
    layer-panel {
      grid-area: layers;
      min-height: 0;
    }

    /* Aircraft detail panel overlays the sidebar */
    aircraft-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 20;
    }
    aircraft-panel[hidden] { display: none; }
    fms-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 25;
    }
    fms-panel[hidden] { display: none; }
    areas-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 25;
    }
    areas-panel[hidden] { display: none; }
    wind-point-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 22;
    }
    wind-point-panel[hidden] { display: none; }
    weather-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 22;
    }
    weather-panel[hidden] { display: none; }
    airport-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 22;
    }
    airport-panel[hidden] { display: none; }
    opacity-panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 24;
    }
    opacity-panel[hidden] { display: none; }
    scenario-editor {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      z-index: 25;
    }

    /* Cesium viewer fills the center */
    #cesium-container {
      grid-area: viewer;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #cesium-container .cesium-viewer,
    #cesium-container .cesium-widget,
    #cesium-container .cesium-widget canvas {
      width: 100% !important;
      height: 100% !important;
    }
    #cesium-container .cesium-viewer-bottom { display: none; }

    /* Toolbar overlays top-left of viewer */
    bluesky-toolbar {
      position: absolute;
      top: 8px; left: 8px;
      z-index: 10;
      border-radius: 4px;
    }

    /* Area tool overlays below toolbar */
    area-tool {
      position: absolute;
      top: 40px; left: 8px;
      z-index: 10;
    }

    /* Camera controls — hidden, replaced by compass-ring */
    camera-controls {
      display: none;
    }

    /* Compass ring overlay — bottom-left of viewer */
    compass-ring {
      position: absolute;
      bottom: 8px; left: 8px;
      z-index: 10;
    }

    /* Measure tool — bottom-left, above compass */
    measure-tool {
      position: absolute;
      bottom: 170px; left: 8px;
      z-index: 12;
    }

    /* Replay panel — bottom-center of viewer */
    replay-panel {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
    }

    /* Scale bar overlay bottom-right of viewer */
    scale-bar {
      position: absolute;
      bottom: 8px; right: 8px;
      z-index: 10;
    }

    /* Weather time scrubber */
    weather-time-strip {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
    }
    weather-time-strip[hidden] { display: none; }

    /* Conflicts panel — overlays top-right of viewer */
    conflicts-panel {
      position: absolute;
      top: 8px; right: 268px;
      z-index: 20;
    }
    conflicts-panel[hidden] { display: none; }

    /* Sidebar: traffic list */
    bluesky-traffic-list {
      grid-area: sidebar;
      border-left: 1px solid #333;
      overflow-y: auto;
      min-height: 0;
    }

    /* Info bar */
    bluesky-statusbar { grid-area: infobar; }

    /* Console */
    bluesky-console { grid-area: console; }
  </style>
</head>
<body>
  <div id="app">
    <layer-panel></layer-panel>
    <div id="cesium-container">
      <bluesky-toolbar></bluesky-toolbar>
      <area-tool hidden></area-tool>
      <camera-controls></camera-controls>
      <scale-bar></scale-bar>
      <settings-panel></settings-panel>
      <compass-ring></compass-ring>
      <measure-tool></measure-tool>
      <replay-panel></replay-panel>
      <weather-time-strip hidden></weather-time-strip>
    </div>
    <bluesky-traffic-list></bluesky-traffic-list>
    <aircraft-panel hidden></aircraft-panel>
    <fms-panel hidden></fms-panel>
    <areas-panel hidden></areas-panel>
    <wind-point-panel hidden></wind-point-panel>
    <weather-panel hidden></weather-panel>
    <airport-panel hidden></airport-panel>
    <opacity-panel hidden></opacity-panel>
    <conflicts-panel hidden></conflicts-panel>
    <scenario-editor hidden></scenario-editor>
    <bluesky-statusbar></bluesky-statusbar>
    <bluesky-console></bluesky-console>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
